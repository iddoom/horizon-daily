theme: jekyll-theme-cayman
title: Alex Horizon Daily
description: AI-curated daily digest for digital products, IT, AI, world affairs, and better thinking
baseurl: "/horizon-daily"
url: "https://iddoom.github.io"

# Build settings
markdown: kramdown
future: true # Allow future posts to be published
plugins:
  - jekyll-feed
feed:
  path: feed.xml
exclude:
  - ".github"
  - "node_modules"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
